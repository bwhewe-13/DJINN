name: Formatting

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package + dev dependencies
        run: python -m pip install -e .[dev]

      - name: Check formatting (black)
        run: black --required-version 26.1.0 --check djinn tests examples

      - name: Check import sorting (isort)
        run: isort --check-only djinn tests examples

      - name: Lint (flake8)
        run: flake8 djinn tests examples
