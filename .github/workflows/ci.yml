name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package + dev dependencies
        run: python -m pip install -e .[dev]

      - name: Check formatting (black)
        run: black --check djinn tests examples

      - name: Check import sorting (isort)
        run: isort --check-only djinn tests examples

      - name: Lint (flake8)
        run: flake8 djinn tests examples

  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package + test dependencies
        run: python -m pip install -e .[testing]

      - name: Run tests
        run: pytest -q
